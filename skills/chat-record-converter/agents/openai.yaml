version: 1
display_name: Chat Record Converter
short_description: 把原始聊天内容转换成 chat-framework 的 md/yaml 输入文件
default_prompt: |
  请将我提供的聊天记录整理为 chat-framework 可用的 chat.md、profiles.yml、chat.yml（必要时含 ui.yml），并做一致性校验。公众号文章默认生成 articles/*.md，并用 Markdown frontmatter 写 title/author/publishAt/summary/cover/images；已有项目全是 YAML 或用户明确要求时才继续用 articles/*.yml。同一发送者连续纯文本可省略重复 sender 头，用空行分隔；带 id/tag 的消息仍使用完整消息头。正文里的 @mention 必须匹配 profile id/name/nickName/identityTimeline/alias；不确定对应谁时先询问用户。
